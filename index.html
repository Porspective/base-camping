          title: "Rethinking the Empty Nest",
          quote: "“Every new beginning comes from some other beginning’s end.” - Seneca",
          content: `The phrase “empty nest” has become a cultural shorthand for a particular life transition - when children leave home and parents are left behind in a quieter, emptier house. It’s a term often accompanied by sympathetic smiles and assumptions of loss. But what if we’ve been looking at it all wrong?

My wife, Dana, and I raised two wonderful children, Connor and Madi, in San Antonio. When Connor graduated from high school and went to college out of state, the house grew quieter.

Two years later when Madi began preparing for her own high school graduation (and also to go out of state for college), the question started coming more frequently: “So, you’re about to become empty nesters?”

### Let’s call it our base camp.

The Power of a New Metaphor

I believe many parents quietly experience this season as a loss of relevance. The house grows quieter. Advice is requested less often. The role that once defined our days no longer demands our attention in quite the same way. 

But this transition is not an epilogue - it’s an intentional shift. Not simply surviving change, but shaping it. A chance to rediscover passions, cultivate new dreams, and fully embrace the person God is still forming.

Growing up in Durango, Colorado near the San Juan Mountains, I learned early that a base camp is a unique place for climbers who are making their ascent. It’s a place of preparation, recovery, and belonging. Climbers visit - and leave - the base camp, but it maintains a posture of readiness and support.

In this metaphor, our children are the climbers. They will ascend their own mountains - college, vocation, relationships, and faith. And we, increasingly, become their base camp. Less directive, but still an essential source of safety and security for those we love.`
        },

          quote: "“See, I am doing a new thing! Now it springs up; do you not perceive it? I am making a way in the wilderness and streams in the wasteland.” - Isaiah 43:19",
          content: `The term “nest” traditionally conjures up images of comfort and coziness. It’s where the young are nurtured until they’re ready to fly. But here’s the thing: a nest stays essentially the same. A static space.

What if the nest could be reimagined? What if the twigs and threads of your home, faith, and relationships don’t fall apart when the kids leave - what if they get rewoven into something more expansive? 

### Reimagining the Nest

Maybe the nest becomes a truly new thing: a place for connection, creativity, rest, and renewal. Maybe it’s God gently creating space for what’s next. 

The base camp mindset begins right here - in the shift from seeing yourself as someone left behind to seeing yourself as someone well-positioned for what God has ahead.`

          content: `The transition to base camping isn’t just about building a home - although that may be part of your dream. It’s about building a new phase of life. And every new phase needs a vision. 

Before you establish your base camp, you have to lift your eyes and consider what mountain stands before you now. 

### A New Trailhead

Proverbs 16:3 tells us, “Commit to the Lord whatever you do, and He will establish your plans.” In mountaineering, climbers don’t just wander into the wilderness hoping to bump into a summit. They study maps, assess risks, and chart their course with intention.`
        },

          id: 4,

          quote: "“The Lord had said to Abram, ‘Go from your country... to the land I will show you.’” - Genesis 12:1",
          content: `Every base camp begins with a location. Finding your land isn’t about chasing a perfect location - it’s about discerning where obedience, peace, and purpose intersect.

### Honor your Current Base Camp

There’s nothing wrong with staying right where you are. A well-rooted base camp can be a powerful place of ministry and peace. Staying put allows you to deepen established relationships and continue cultivating spiritual soil. 

### The Spiritual Significance of Land

Land is inseparable from promise, purpose, and identity. Deuteronomy 8:7-10 says, “For the Lord your God is bringing you into a good land - a land with brooks, streams, and deep springs...” 

For me, the mountains of Durango, Colorado, have always held a sacred place in my story. Returning home was not just geographical, but spiritual. Up in the high-alpine air, peaks rise like cathedrals, and aspens tremble like congregations in worship.`
        }

              <div className="grid md:grid-cols-2 lg:grid-cols-5 gap-6">
                {WORKSHEETS.map(ws => (
                  <div key={ws.id} onClick={() => onWork(ws.id)} className="worksheet-card p-8 bg-basecamp-sky/30 rounded-3xl border border-black/5 flex flex-col justify-between hover:bg-white hover:shadow-xl transition-all cursor-pointer group min-h-[280px]">
                    <div>
                      <div className="ws-icon w-12 h-12 rounded-xl bg-white text-basecamp-stone flex items-center justify-center mb-6 shadow-md group-hover:bg-basecamp-accent group-hover:text-white transition-all duration-500"><ClipboardList className="w-5 h-5" /></div>
                      <h3 className="text-xl font-serif mb-2 leading-tight text-basecamp-stone">{ws.title}</h3>
                      <span className="text-[10px] font-bold uppercase opacity-30 tracking-widest">Worksheet 0{ws.id}</span>
                    </div>
                    <div className="mt-8 flex items-center gap-2 text-[10px] font-bold text-basecamp-accent uppercase tracking-wider">
                      Open Document <ArrowRight className="w-3 h-3 transition-transform group-hover:translate-x-1" />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </motion.div>
        );
      }

      function WorksheetDetail({ ws, onBack }) {
        if (!ws) return null;
        return (
          <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="pt-32 pb-20 px-6 max-w-4xl mx-auto">
            <div className="flex justify-between items-center mb-12 no-print">
              <button onClick={onBack} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-basecamp-accent group outline-none"><ArrowLeft className="w-4 h-4 transition-transform group-hover:-translate-x-1" /> Back to Gallery</button>

            </div>
            <div className="bg-white rounded-[3rem] p-12 md:p-20 shadow-2xl border border-black/5 printable-content text-left">
              <div className="flex items-start justify-between mb-16">
                 <div className="space-y-4">
                    <span className="text-[10px] font-bold uppercase tracking-[0.4em] text-basecamp-accent block">Reflection + Planning</span>
                    <h1 className="text-5xl md:text-7xl font-serif text-basecamp-stone">{ws.title}</h1>
                 </div>
                 <div className="w-20 h-20 bg-basecamp-sky/50 rounded-2xl flex items-center justify-center border border-black/5 no-print">
                    <PenTool className="w-10 h-10 text-basecamp-stone opacity-20" />
                 </div>
              </div>
              <div className="space-y-16">
                {ws.sections.map((sec, i) => (
                  <div key={i} className="space-y-6">
                    {sec.type === "title" && <h3 className="text-2xl font-bold uppercase tracking-[0.2em] pt-10 border-t border-black/5 text-basecamp-stone">{sec.text}</h3>}
                    {sec.type === "text" && <p className="text-basecamp-earth italic font-light text-lg">{sec.text}</p>}
                    {sec.type === "input" && (
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold uppercase opacity-40 tracking-widest">{sec.label}</label>
                        <input className="w-full bg-basecamp-sky/10 border-b-2 border-black/10 p-5 focus:border-basecamp-accent outline-none text-basecamp-stone transition-colors" placeholder="Enter reflection..." />
                      </div>
                    )}
                    {sec.type === "textarea" && (
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold uppercase opacity-40 tracking-widest">{sec.label}</label>
                        <textarea rows={6} className="w-full bg-basecamp-sky/10 rounded-3xl p-8 focus:border-basecamp-accent outline-none border border-transparent text-basecamp-stone resize-none transition-all font-light text-lg leading-relaxed" placeholder="Share your thoughts..." />
                      </div>
                    )}
                    {sec.type === "checkboxes" && (
                      <div className="space-y-6 text-left">
                         {sec.label && <label className="text-[10px] font-bold uppercase tracking-widest opacity-40 block">{sec.label}</label>}
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                           {sec.options.map(opt => (
                             <label key={opt} className="flex items-center gap-4 p-6 bg-basecamp-sky/5 rounded-2xl cursor-pointer border border-transparent hover:border-basecamp-accent/20 transition-all">
                               <input type="checkbox" className="w-5 h-5 rounded-md" /> 
                               <span className="text-base text-basecamp-stone font-medium ml-4">{opt}</span>
                             </label>
                           ))}
                         </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </motion.div>
        );
      }

      function ChapterView({ chapter, onBack }) {
        if (!chapter) return null;
        return (
          <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }} className="pt-32 pb-20 px-6 max-w-4xl mx-auto min-h-screen text-basecamp-stone text-left">
            <button onClick={onBack} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-basecamp-accent mb-12 group outline-none"><ArrowLeft className="w-4 h-4 transition-transform group-hover:-translate-x-1" /> Back to Guide</button>
            <div className="prose prose-lg max-w-none text-basecamp-stone text-left">
              <span className="text-[10px] font-bold uppercase tracking-[0.4em] text-basecamp-accent mb-4 block text-left">Chapter 0{chapter.id}</span>
              <h1 className="text-5xl md:text-8xl font-serif mb-10 leading-tight tracking-tighter text-left">{chapter.title}</h1>
              <blockquote className="text-2xl italic border-l-4 border-basecamp-accent pl-10 py-4 mb-16 text-basecamp-earth leading-snug font-serif bg-basecamp-sky/20 pr-8 rounded-r-3xl text-left">{chapter.quote}</blockquote>
              <div className="font-light leading-relaxed whitespace-pre-wrap text-xl space-y-8 text-left">
                {chapter.content.split('\n\n').map((para, i) => para.startsWith('### ') ? <h3 key={i} className="text-3xl font-serif mt-16 mb-8 text-basecamp-stone font-bold">{para.replace('### ', '')}</h3> : <p key={i} className="mb-8">{para}</p>)}
              </div>
            </div>
            <button onClick={onBack} className="mt-20 px-12 py-5 bg-basecamp-stone text-white rounded-full text-xs font-bold uppercase tracking-widest shadow-xl hover:bg-basecamp-accent transition-all mx-auto block outline-none">Continue Journey</button>
          </motion.div>
        );
      }

      function CommunityRedditStyle() {
        return (
          <section id="community" className="py-32 px-8 bg-white no-print">
            <div className="max-w-6xl mx-auto">
               <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8 text-left">
                  <div className="max-w-2xl text-left">
                    <span className="text-basecamp-accent font-bold text-[10px] uppercase tracking-[0.4em] block mb-4">The Base Camp Summit</span>
                    <h2 className="text-6xl md:text-7xl font-serif text-basecamp-stone leading-none tracking-tighter">Community <span className="italic font-light text-basecamp-forest">Threads</span></h2>
                  </div>
               </div>

               <div className="bg-basecamp-sky/20 rounded-[3rem] p-10 md:p-16 border border-black/5 flex flex-col min-h-[400px] text-left relative overflow-hidden max-w-4xl mx-auto">
                  <div className="flex flex-col h-full justify-between">
                    <div>
                      <div className="flex items-center gap-4 mb-8 text-left">
                         <div className="w-14 h-14 rounded-2xl bg-basecamp-accent flex items-center justify-center text-white text-xl font-bold shadow-md border-2 border-white">B</div>
                         <div>
                            <h3 className="text-base font-bold text-basecamp-stone uppercase tracking-widest">Base Camper</h3>
                            <p className="text-[10px] opacity-40 uppercase tracking-widest">Today • Starting the climb</p>
                         </div>
                      </div>
                      
                      <h2 className="text-4xl md:text-5xl font-serif text-basecamp-stone mb-8 leading-tight text-left">Establish Your First Base Camp Reflection</h2>
                      <p className="text-xl font-light text-basecamp-earth whitespace-pre-wrap leading-relaxed mb-12 text-left">Welcome to the Base Camp forum. This is a dedicated space for parents navigating the transition beyond the empty nest. Start a conversation or share a reflection below.</p>
                      
                      <div className="pt-12 border-t border-black/10 text-left">
                         <h4 className="text-[10px] font-bold uppercase tracking-widest text-basecamp-forest mb-8">Responses From The Trail</h4>
                         <p className="text-sm italic opacity-40 font-light mb-8">No responses to this reflection yet. Be the first to share your wisdom.</p>
                      </div>
                    </div>

                    <div className="mt-8 bg-white rounded-3xl p-8 border border-black/5 shadow-sm text-left">
                       <p className="text-xs font-bold text-basecamp-stone mb-4 opacity-40 uppercase">Post your own reflection</p>
                       <textarea className="w-full bg-basecamp-sky/30 rounded-2xl p-6 text-sm outline-none focus:ring-2 ring-basecamp-forest/20 resize-none min-h-[120px] text-basecamp-stone" placeholder="Share your experience with the community..."></textarea>
                       <div className="flex justify-end mt-4">
                          <button className="px-10 py-4 bg-basecamp-stone text-white rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-basecamp-forest transition-all shadow-lg active:scale-95 outline-none font-sans">Publish Reflection</button>
                       </div>
                    </div>
                  </div>
               </div>
            </div>
          </section>
        );
      }

      function MetaphorSection() {
        return (
          <section id="metaphor" className="py-40 px-8 bg-white overflow-hidden text-left">
            <div className="max-w-6xl mx-auto grid lg:grid-cols-[1fr_1.2fr] gap-24 items-center">
              <div className="space-y-12 text-basecamp-stone text-left">
                <div className="w-24 h-2 bg-basecamp-accent rounded-full" />
                <h2 className="text-6xl md:text-7xl leading-[0.95] tracking-tight font-serif text-left">You are the <span className="italic font-light text-left">Base Camp</span>. <br /> They are the <span className="italic font-light text-left">Climbers</span>.</h2>
                <p className="text-basecamp-earth leading-relaxed text-xl font-light text-left">The phrase “empty nest” has become shorthand for transition. But what if the emptiness isn’t an ending? What if it’s an opening?</p>
                <div className="grid grid-cols-2 gap-10 text-left">
                   <div className="space-y-4 p-8 bg-basecamp-sky/20 rounded-[2.5rem] border border-black/5 text-left">
                      <Flame className="w-8 h-8 text-basecamp-accent mx-0" />
                      <h4 className="font-bold text-xs uppercase tracking-[0.2em] text-left">Reliability</h4>
                      <p className="text-sm opacity-60 font-light text-left">A safe haven when the weather turns harsh.</p>
                   </div>
                   <div className="space-y-4 p-8 bg-basecamp-sky/20 rounded-[2.5rem] border border-black/5 text-left">
                      <Compass className="w-8 h-8 text-basecamp-accent mx-0" />
                      <h4 className="font-bold text-xs uppercase tracking-[0.2em] text-left">Wisdom</h4>
                      <p className="text-sm opacity-60 font-light text-left">Perspective from having walked the floor.</p>
                   </div>
                </div>
              </div>
              <div className="relative">
                <img 
                  src={METAPHOR_PHOTO} 
                  className="rounded-[3rem] shadow-2xl grayscale-0 transition-all duration-1000" 
                  alt="Base camp metaphor" 
                  referrerPolicy="no-referrer" 
                />
                <motion.div initial={{ y: 50, opacity: 0 }} whileInView={{ y: 0, opacity: 1 }} viewport={{ once: true }} className="absolute -bottom-12 -left-12 p-12 bg-white/90 backdrop-blur-2xl rounded-[3rem] shadow-2xl border border-white/40 max-w-sm text-left"><p className="text-2xl italic font-serif leading-relaxed text-basecamp-stone text-left">"I lift up my eyes to the mountains—where does my help come from?"</p><p className="mt-8 text-[10px] uppercase font-bold text-basecamp-accent tracking-widest text-left">— Psalm 121:1-2</p></motion.div>
              </div>
            </div>
          </section>
        );
      }

        return (
          <section className="py-48 bg-basecamp-stone text-basecamp-sky text-center px-8 relative overflow-hidden no-print">
            <h2 className="text-5xl md:text-7xl font-serif italic max-w-5xl mx-auto leading-[1.1] relative z-10 drop-shadow-xl">"The empty nest isn't a void to be filled, but a base camp to be built."</h2>
            <div className="w-24 h-1.5 bg-basecamp-accent mx-auto mt-16 mb-6 relative z-10 rounded-full" />
            <p className="text-[10px] font-bold uppercase tracking-[0.6em] opacity-40 relative z-10 font-sans">The Core Philosophy</p>

                <img src={JUSTIN_PHOTO} className="w-72 h-72 md:w-96 md:h-96 rounded-[4rem] object-cover shadow-2xl transition-all duration-1000" alt="Justin Schmitt" referrerPolicy="no-referrer" />

              <div className="flex-1 space-y-10 text-basecamp-stone text-left">
                <div className="flex items-center gap-4 text-left">
                   <div className="w-12 h-0.5 bg-basecamp-accent" />
                   <span className="text-basecamp-accent font-bold text-[10px] tracking-[0.5em] uppercase text-left font-sans">The Author</span>
                </div>
                <h2 className="text-6xl md:text-7xl font-serif tracking-tighter text-left">Justin Schmitt</h2>
                <p className="text-basecamp-earth font-light leading-relaxed text-2xl text-left">A Christian, husband, father, and ski instructor, he spent decades in leadership before returning home to Durango, Colorado to write and serve.</p>
                <div className="flex gap-12 pt-6 text-left">
                   <a href="#" className="flex items-center gap-3 text-xs font-bold uppercase tracking-[0.2em] hover:text-basecamp-accent transition-colors group text-left font-sans"><Star className="w-5 h-5 text-basecamp-accent group-hover:rotate-45 transition-transform" /> Newsletter</a>
                   <a href="#" className="flex items-center gap-3 text-xs font-bold uppercase tracking-[0.2em] hover:text-basecamp-accent transition-colors group text-left font-sans"><Heart className="w-5 h-5 text-basecamp-accent group-hover:scale-125 transition-transform" /> Connect</a>
                </div>
              </div>
            </div>
          </section>
        );

      function Footer() {
        return (
          <footer className="py-24 px-8 bg-basecamp-sky border-t border-black/5 text-center no-print text-basecamp-stone">
            <div className="max-w-4xl mx-auto space-y-8">
               <Mountain className="w-12 h-12 text-basecamp-accent mx-auto mb-10 opacity-60" />
               <div className="flex justify-center gap-12 text-[10px] font-bold uppercase tracking-[0.4em] opacity-40 font-sans">
                  <a href="#" className="hover:text-basecamp-accent">Privacy Policy</a>
                  <a href="#" className="hover:text-basecamp-accent">Terms of Service</a>
                  <a href="#" className="hover:text-basecamp-accent">Media Kit</a>

               <p className="text-[10px] font-bold uppercase tracking-[0.5em] opacity-25 font-sans">© 2026 Justin Schmitt — Durango, Colorado</p>
            </div>
          </footer>
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(<StrictMode><App /></StrictMode>);
    </script>
  </body>
</html>
