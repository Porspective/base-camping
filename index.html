<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Camping | Beyond the Empty Nest</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            colors: {
              basecamp: { stone: "#2D2D2A", earth: "#4C4B40", sky: "#E8EDF3", accent: "#D4A373" },
            },
          },
        },
      }
    </script>
    
    <style type="text/css">
      .mountain-gradient { background: linear-gradient(to bottom, rgba(232, 237, 243, 0) 0%, rgba(232, 237, 243, 1) 100%); }
      .perspective-1000 { perspective: 1000px; }
      body { background-color: #E8EDF3; margin: 0; }
      #root:empty::before { content: 'Loading Base Camp...'; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: serif; font-style: italic; color: #4C4B40; }
    </style>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map: Forces all libraries to use the same React instance -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "motion/react": "https://esm.sh/motion/react@12.0.0?external=react,react-dom",
        "lucide-react": "https://esm.sh/lucide-react@0.475.0?external=react,react-dom",
        "clsx": "https://esm.sh/clsx@2.1.1",
        "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.2",
        "firebase/app": "https://esm.sh/firebase@11.3.1/app",
        "firebase/auth": "https://esm.sh/firebase@11.3.1/auth",
        "firebase/firestore": "https://esm.sh/firebase@11.3.1/firestore"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { StrictMode, useState, useEffect, useCallback } from 'react';
      import { createRoot } from 'react-dom/client';
      import { motion, AnimatePresence } from 'motion/react';
      import { Mountain, Tent, Map as MapIcon, Compass, BookOpen, User, ChevronRight, ArrowRight, MessageSquare, Send, LogIn, Plus, X } from 'lucide-react';
      import { clsx } from 'clsx';
      import { twMerge } from 'tailwind-merge';

      // Firebase
      import { initializeApp } from 'firebase/app';
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'firebase/auth';
      import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, Timestamp } from 'firebase/firestore';

      const firebaseConfig = {
        projectId: "gen-lang-client-0193285572",
        appId: "1:307650621337:web:d15291e700af35a0e26d08",
        apiKey: "AIzaSyAW4tK4syCdX2Z8oeqPdwGaytVzp01HW2g",
        authDomain: "gen-lang-client-0193285572.firebaseapp.com",
        firestoreDatabaseId: "ai-studio-26b79e90-40c3-40f1-bc36-be2388365943"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
      const auth = getAuth(app);
      const googleProvider = new GoogleAuthProvider();

      function cn(...inputs) { return twMerge(clsx(inputs)); }

      function App() {
        return (
          <div className="min-h-screen bg-[#E8EDF3] text-[#2D2D2A] font-sans">
            <Navbar />
            <Hero />
            <MetaphorSection />
            <QuoteSection />
            <BookDetails />
            <CommunitySection />
            <AuthorSection />
            <Footer />
          </div>
        );
      }

      function Navbar() {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const h = () => setScrolled(window.scrollY > 50);
          window.addEventListener('scroll', h);
          return () => window.removeEventListener('scroll', h);
        }, []);

        return (
          <motion.nav initial={{ y: -100 }} animate={{ y: 0 }} className={cn("fixed top-0 w-full z-50 px-8 py-6 transition-all", scrolled ? "bg-white/80 backdrop-blur-md py-4 border-b border-black/5" : "bg-transparent")}>
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center gap-2"><Mountain className="w-6 h-6" /><span className="font-bold uppercase text-xs tracking-widest">Base Camping</span></div>
              <div className="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest">
                <a href="#book">The Book</a>
                <a href="#community">Community</a>
                <a href="#author">Author</a>
                <button className="bg-[#2D2D2A] text-white px-6 py-2 rounded-full">Pre-Order</button>
              </div>
            </div>
          </motion.nav>
        );
      }

      function Hero() {
        return (
          <section className="h-screen relative flex items-center justify-center text-center px-4">
            <div className="absolute inset-0 z-0">
              <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000" className="w-full h-full object-cover opacity-80" />
              <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#E8EDF3]" />
            </div>
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="relative z-10 max-w-4xl">
              <h1 className="text-7xl md:text-9xl font-serif leading-none mb-8">Base <span className="italic font-light">Camping</span></h1>
              <p className="text-xl md:text-2xl font-light text-[#4C4B40] mb-12">The empty nest isn’t an ending—it’s an opening. A sacred opportunity where new dreams are built.</p>
              <button className="bg-[#2D2D2A] text-white px-10 py-5 rounded-full text-xs font-bold uppercase tracking-widest">Explore the Guide</button>
            </motion.div>
          </section>
        );
      }

      function MetaphorSection() {
        return (
          <section className="py-32 px-8 bg-white">
            <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-20 items-center">
              <div className="space-y-8">
                <h2 className="text-5xl font-serif">You are the <span className="italic">Base Camp</span>.</h2>
                <p className="text-xl font-light leading-relaxed">What if the emptiness isn’t an ending at all? What if it’s an opening for a new kind of reliability and wisdom?</p>
                <div className="grid grid-cols-2 gap-8">
                  <div className="p-6 bg-[#E8EDF3]/50 rounded-2xl"><Tent className="mb-4 text-[#D4A373]" /><strong>Reliability</strong></div>
                  <div className="p-6 bg-[#E8EDF3]/50 rounded-2xl"><Compass className="mb-4 text-[#D4A373]" /><strong>Wisdom</strong></div>
                </div>
              </div>
              <div className="rounded-[2rem] overflow-hidden shadow-2xl">
                <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&q=80&w=1000" className="w-full h-full object-cover" />
              </div>
            </div>
          </section>
        );
      }

      function QuoteSection() {
        return (
          <section className="py-32 bg-[#2D2D2A] text-[#E8EDF3] text-center px-8">
            <h2 className="text-4xl md:text-6xl font-serif italic max-w-4xl mx-auto">"The empty nest isn't a void to be filled, but a base camp to be built."</h2>
          </section>
        );
      }

      function BookDetails() {
        const ch = ["The First Ascent", "Packing Light", "The Valley of Purpose", "Grounded in Truth"];
        return (
          <section id="book" className="py-32 px-8">
            <div className="max-w-7xl mx-auto">
              <h2 className="text-6xl font-serif mb-20">Inside the <span className="italic">Pages</span></h2>
              <div className="grid md:grid-cols-4 gap-6">
                {ch.map((t, i) => (
                  <div key={i} className="p-10 bg-white rounded-[2rem] shadow-sm hover:shadow-xl transition-all">
                    <Mountain className="mb-8 text-[#D4A373]" />
                    <h3 className="text-2xl font-serif mb-4">{t}</h3>
                    <p className="text-sm font-light text-[#4C4B40]">Chapter 0{i+1} — Coming Soon</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      function CommunitySection() {
        const [user, setUser] = useState(null);
        const [threads, setThreads] = useState([]);
        const [selected, setSelected] = useState(null);
        const [msg, setMsg] = useState("");

        useEffect(() => {
          onAuthStateChanged(auth, setUser);
          const q = query(collection(db, "threads"), orderBy("createdAt", "desc"), limit(20));
          return onSnapshot(q, s => setThreads(s.docs.map(d => ({ id: d.id, ...d.data() }))));
        }, []);

        const post = async (e) => {
          e.preventDefault();
          if (!user || !msg) return;
          await addDoc(collection(db, "threads"), { title: msg, content: msg, authorName: user.displayName, createdAt: Timestamp.now() });
          setMsg("");
        };

        return (
          <section id="community" className="py-32 px-8 bg-white">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-6xl font-serif mb-16">Community <span className="italic">Threads</span></h2>
              <div className="grid md:grid-cols-[1fr_2fr] gap-12">
                <div className="space-y-4">
                  {threads.map(t => (
                    <div key={t.id} onClick={() => setSelected(t)} className={cn("p-6 rounded-2xl border cursor-pointer", selected?.id === t.id ? "bg-[#2D2D2A] text-white" : "bg-[#E8EDF3]/30")}>
                      <h3 className="font-serif">{t.title}</h3>
                      <p className="text-xs opacity-60">{t.authorName}</p>
                    </div>
                  ))}
                </div>
                <div className="bg-[#E8EDF3]/20 rounded-[2rem] p-12 min-h-[400px]">
                  {selected ? (
                    <div>
                      <h3 className="text-3xl font-serif mb-4">{selected.title}</h3>
                      <p className="font-light">{selected.content}</p>
                    </div>
                  ) : <p className="text-center opacity-40">Select a thread to read</p>}
                  {user ? (
                    <form onSubmit={post} className="mt-12 flex gap-2">
                      <input value={msg} onChange={e => setMsg(e.target.value)} placeholder="Share a reflection..." className="flex-grow p-4 rounded-full border" />
                      <button className="bg-[#2D2D2A] text-white px-8 rounded-full"><Send className="w-4 h-4" /></button>
                    </form>
                  ) : <button onClick={() => signInWithPopup(auth, googleProvider)} className="mt-12 w-full p-4 bg-[#2D2D2A] text-white rounded-full">Sign in to join</button>}
                </div>
              </div>
            </div>
          </section>
        );
      }

      function AuthorSection() {
        return (
          <section id="author" className="py-32 px-8">
            <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-20">
              <div className="w-64 h-64 rounded-[3rem] overflow-hidden shadow-2xl">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=500" className="w-full h-full object-cover" />
              </div>
              <div className="space-y-6">
                <h2 className="text-5xl font-serif">Justin Schmitt</h2>
                <p className="text-xl font-light">Justin retired to Durango, Colorado—where his love for the outdoors and faith first took root. He now teaches skiing, a front-row seat to courage and progress.</p>
              </div>
            </div>
          </section>
        );
      }

      function Footer() {
        return (
          <footer className="py-20 text-center border-t">
            <div className="flex justify-center gap-2 mb-4"><Mountain /><span className="font-bold uppercase tracking-widest">Base Camping</span></div>
            <p className="text-xs opacity-40">© 2026 Justin Schmitt. All Rights Reserved.</p>
          </footer>
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(<StrictMode><App /></StrictMode>);
    </script>
  </body>
</html>
