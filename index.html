<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Camping | Beyond the Empty Nest</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              serif: ["Playfair Display", "serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              basecamp: {
                stone: "#2D2D2A",
                earth: "#4C4B40",
                sky: "#E8EDF3",
                accent: "#D4A373",
              },
            },
          },
        },
      }
    </script>
    
    <style type="text/css">
      .mountain-gradient {
        background: linear-gradient(to bottom, rgba(232, 237, 243, 0) 0%, rgba(232, 237, 243, 1) 100%);
      }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(45, 45, 42, 0.1); border-radius: 10px; }
      .perspective-1000 { perspective: 1000px; }
    </style>

    <!-- React and Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Robust Import Map to prevent "Multiple Reacts" error -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "motion/react": "https://esm.sh/motion/react@12.0.0?deps=react@19.0.0",
        "lucide-react": "https://esm.sh/lucide-react@0.475.0?deps=react@19.0.0",
        "clsx": "https://esm.sh/clsx@2.1.1",
        "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.2",
        "firebase/app": "https://esm.sh/firebase@11.3.1/app",
        "firebase/auth": "https://esm.sh/firebase@11.3.1/auth",
        "firebase/firestore": "https://esm.sh/firebase@11.3.1/firestore"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { StrictMode, useCallback, useState, useEffect } from 'react';
      import { createRoot } from 'react-dom/client';
      import { motion, AnimatePresence } from "motion/react";
      import { Mountain, Tent, Map as MapIcon, Compass, BookOpen, User, ChevronRight, ArrowRight, MessageSquare, Send, LogIn, Plus, X } from "lucide-react";
      import { clsx } from "clsx";
      import { twMerge } from "tailwind-merge";

      // Firebase imports
      import { initializeApp } from 'firebase/app';
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'firebase/auth';
      import { getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, limit, Timestamp, getDocFromServer } from 'firebase/firestore';

      const firebaseConfig = {
        projectId: "gen-lang-client-0193285572",
        appId: "1:307650621337:web:d15291e700af35a0e26d08",
        apiKey: "AIzaSyAW4tK4syCdX2Z8oeqPdwGaytVzp01HW2g",
        authDomain: "gen-lang-client-0193285572.firebaseapp.com",
        firestoreDatabaseId: "ai-studio-26b79e90-40c3-40f1-bc36-be2388365943",
        storageBucket: "gen-lang-client-0193285572.firebasestorage.app",
        messagingSenderId: "307650621337",
        measurementId: ""
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
      const auth = getAuth(app);
      const googleProvider = new GoogleAuthProvider();

      const OperationType = { CREATE: 'create', UPDATE: 'update', DELETE: 'delete', LIST: 'list', GET: 'get', WRITE: 'write' };

      function handleFirestoreError(error, operationType, path) {
        const errInfo = {
          error: error instanceof Error ? error.message : String(error),
          authInfo: { userId: auth.currentUser?.uid, email: auth.currentUser?.email },
          operationType,
          path
        }
        console.error('Firestore Error: ', JSON.stringify(errInfo));
        throw new Error(JSON.stringify(errInfo));
      }

      function cn(...inputs) { return twMerge(clsx(inputs)); }

      class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { hasError: false, errorInfo: null }; }
        static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error.message }; }
        render() {
          if (this.state.hasError) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-[#E8EDF3] p-8 font-sans">
                <div className="max-w-2xl w-full p-12 bg-white rounded-[3rem] shadow-2xl border border-black/5 text-center">
                  <X className="w-10 h-10 text-red-500 mx-auto mb-8" />
                  <h2 className="text-3xl font-serif mb-4">Something went wrong</h2>
                  <pre className="text-xs text-red-700 font-mono bg-red-50 p-6 rounded-2xl text-left mb-10 overflow-auto max-h-60 whitespace-pre-wrap">
                    {this.state.errorInfo}
                  </pre>
                  <button onClick={() => window.location.reload()} className="px-10 py-4 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest">Reload Page</button>
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }

      function App() {
        return (
          <ErrorBoundary>
            <div className="min-h-screen selection:bg-[#D4A373]/30 bg-[#E8EDF3]">
              <Navbar />
              <Hero />
              <MetaphorSection />
              <QuoteSection />
              <BookDetails />
              <CommunitySection />
              <AuthorSection />
              <Footer />
            </div>
          </ErrorBoundary>
        );
      }

      function CommunitySection() {
        const [user, setUser] = useState(null);
        const [threads, setThreads] = useState([]);
        const [selectedThread, setSelectedThread] = useState(null);
        const [isNewThreadModalOpen, setIsNewThreadModalOpen] = useState(false);
        const [newThreadTitle, setNewThreadTitle] = useState("");
        const [newThreadContent, setNewThreadContent] = useState("");
        const [isAuthReady, setIsAuthReady] = useState(false);

        useEffect(() => {
          const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setIsAuthReady(true); });
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!isAuthReady) return;
          const q = query(collection(db, "threads"), orderBy("createdAt", "desc"), limit(50));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            setThreads(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          }, (error) => handleFirestoreError(error, OperationType.GET, "threads"));
          return () => unsubscribe();
        }, [isAuthReady]);

        const handleLogin = async () => {
          try { await signInWithPopup(auth, googleProvider); } catch (error) { alert(error.message); }
        };

        const handleCreateThread = async (e) => {
          e.preventDefault();
          if (!user || !newThreadTitle || !newThreadContent) return;
          try {
            await addDoc(collection(db, "threads"), {
              title: newThreadTitle, content: newThreadContent, authorId: user.uid,
              authorName: user.displayName || "Anonymous", authorPhoto: user.photoURL || "",
              createdAt: Timestamp.now()
            });
            setNewThreadTitle(""); setNewThreadContent(""); setIsNewThreadModalOpen(false);
          } catch (error) { alert(error.message); }
        };

        return (
          <section id="community" className="py-32 px-8 bg-white overflow-hidden">
            <div className="max-w-6xl mx-auto">
              <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                <div className="max-w-2xl">
                  <span className="text-[#D4A373] font-bold text-[10px] tracking-[0.3em] uppercase mb-4 block">The Base Camp Forum</span>
                  <h2 className="text-5xl md:text-7xl font-serif leading-none tracking-tighter">Community <span className="italic font-light text-[#4C4B40]/40">Threads</span></h2>
                </div>
                <div className="flex flex-col items-end gap-4">
                  {!user ? (
                    <button onClick={handleLogin} className="flex items-center gap-2 px-6 py-3 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest">
                      <LogIn className="w-4 h-4" /> Join the Conversation
                    </button>
                  ) : (
                    <button onClick={() => setIsNewThreadModalOpen(true)} className="flex items-center gap-2 px-6 py-3 bg-[#D4A373] text-[#2D2D2A] rounded-full text-xs font-bold uppercase tracking-widest">
                      <Plus className="w-4 h-4" /> Start a Thread
                    </button>
                  )}
                </div>
              </div>

              <div className="grid lg:grid-cols-[1fr_1.5fr] gap-12">
                <div className="space-y-4 max-h-[600px] overflow-y-auto pr-4 scrollbar-thin">
                  {threads.length === 0 ? (
                    <div className="p-12 text-center border-2 border-dashed border-black/10 rounded-[2rem]">
                      <MessageSquare className="w-12 h-12 text-black/20 mx-auto mb-4" />
                      <p className="text-[#4C4B40]/60 font-light italic">No threads yet.</p>
                    </div>
                  ) : (
                    threads.map((thread) => (
                      <motion.div key={thread.id} onClick={() => setSelectedThread(thread)} className={cn("p-6 rounded-2xl border transition-all cursor-pointer group", selectedThread?.id === thread.id ? "bg-[#2D2D2A] text-[#E8EDF3]" : "bg-[#E8EDF3]/30 border-black/5 hover:bg-white")}>
                        <div className="flex items-center gap-3 mb-4">
                          <div className="w-8 h-8 rounded-full overflow-hidden bg-[#4C4B40]/20 flex-shrink-0">
                            {thread.authorPhoto ? <img src={thread.authorPhoto} className="w-full h-full object-cover" referrerPolicy="no-referrer" /> : <User className="w-4 h-4 m-2" />}
                          </div>
                          <span className="text-[10px] font-bold uppercase tracking-widest">{thread.authorName}</span>
                        </div>
                        <h3 className="text-xl font-serif mb-2">{thread.title}</h3>
                        <p className="text-sm line-clamp-2 font-light">{thread.content}</p>
                      </motion.div>
                    ))
                  )}
                </div>

                <div className="bg-[#E8EDF3]/20 rounded-[2.5rem] p-8 md:p-12 border border-black/5 min-h-[600px] flex flex-col">
                  <AnimatePresence mode="wait">
                    {selectedThread ? (
                      <motion.div key={selectedThread.id} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="flex flex-col h-full">
                        <div className="mb-10">
                          <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-12 rounded-2xl overflow-hidden bg-[#4C4B40] shadow-lg">
                              {selectedThread.authorPhoto ? <img src={selectedThread.authorPhoto} className="w-full h-full object-cover" referrerPolicy="no-referrer" /> : <User className="w-6 h-6 m-3 text-[#E8EDF3]" />}
                            </div>
                            <div>
                              <h4 className="font-bold text-sm text-[#2D2D2A]">{selectedThread.authorName}</h4>
                              <p className="text-[10px] uppercase tracking-widest text-[#4C4B40]/60">{selectedThread.createdAt?.toDate().toLocaleDateString()}</p>
                            </div>
                          </div>
                          <h2 className="text-3xl md:text-4xl font-serif mb-6 leading-tight">{selectedThread.title}</h2>
                          <p className="text-[#4C4B40] text-lg leading-relaxed font-light whitespace-pre-wrap">{selectedThread.content}</p>
                        </div>
                        <div className="flex-grow border-t border-black/10 pt-10">
                          <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#2D2D2A] mb-8">Responses</h4>
                          <CommentsList threadId={selectedThread.id} user={user} />
                        </div>
                      </motion.div>
                    ) : (
                      <div className="flex flex-col items-center justify-center flex-grow text-center space-y-6">
                        <Compass className="w-10 h-10 text-black/20" />
                        <h3 className="text-xl font-serif">Select a thread</h3>
                      </div>
                    )}
                  </AnimatePresence>
                </div>
              </div>
            </div>

            <AnimatePresence>
              {isNewThreadModalOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setIsNewThreadModalOpen(false)} className="absolute inset-0 bg-black/60 backdrop-blur-md" />
                  <motion.div initial={{ opacity: 0, scale: 0.9, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.9, y: 20 }} className="relative w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-12">
                    <div className="flex items-center justify-between mb-10">
                      <h2 className="text-3xl font-serif">Start a New Reflection</h2>
                      <button onClick={() => setIsNewThreadModalOpen(false)}><X className="w-6 h-6" /></button>
                    </div>
                    <form onSubmit={handleCreateThread} className="space-y-6">
                      <input required value={newThreadTitle} onChange={(e) => setNewThreadTitle(e.target.value)} placeholder="Thread Title" className="w-full bg-[#E8EDF3]/30 border border-black/5 rounded-2xl px-6 py-4" />
                      <textarea required value={newThreadContent} onChange={(e) => setNewThreadContent(e.target.value)} placeholder="Your Thoughts" rows={6} className="w-full bg-[#E8EDF3]/30 border border-black/5 rounded-2xl px-6 py-4 resize-none" />
                      <button type="submit" className="w-full py-5 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest">Post to Base Camp</button>
                    </form>
                  </motion.div>
                </div>
              )}
            </AnimatePresence>
          </section>
        );
      }

      function CommentsList({ threadId, user }) {
        const [comments, setComments] = useState([]);
        const [newComment, setNewComment] = useState("");
        useEffect(() => {
          const q = query(collection(db, "threads", threadId, "comments"), orderBy("createdAt", "asc"));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            setComments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          }, (error) => handleFirestoreError(error, OperationType.GET, `threads/${threadId}/comments`));
          return () => unsubscribe();
        }, [threadId]);

        const handleAddComment = async (e) => {
          e.preventDefault();
          if (!user || !newComment) return;
          try {
            await addDoc(collection(db, "threads", threadId, "comments"), {
              content: newComment, authorId: user.uid, authorName: user.displayName || "Anonymous",
              authorPhoto: user.photoURL || "", createdAt: Timestamp.now()
            });
            setNewComment("");
          } catch (error) { alert(error.message); }
        };

        return (
          <div className="space-y-8">
            <div className="space-y-6">
              {comments.map((comment) => (
                <div key={comment.id} className="flex gap-4">
                  <div className="w-8 h-8 rounded-full overflow-hidden bg-[#4C4B40]/10 flex-shrink-0">
                    {comment.authorPhoto ? <img src={comment.authorPhoto} className="w-full h-full object-cover" referrerPolicy="no-referrer" /> : <User className="w-4 h-4 m-2" />}
                  </div>
                  <div className="flex-grow">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-bold text-[#2D2D2A]">{comment.authorName}</span>
                      <span className="text-[10px] text-[#4C4B40]/40 uppercase tracking-widest">{comment.createdAt?.toDate().toLocaleDateString()}</span>
                    </div>
                    <p className="text-sm text-[#4C4B40] leading-relaxed font-light">{comment.content}</p>
                  </div>
                </div>
              ))}
            </div>
            {user ? (
              <form onSubmit={handleAddComment} className="relative mt-10">
                <input value={newComment} onChange={(e) => setNewComment(e.target.value)} placeholder="Add a response..." className="w-full bg-white border border-black/10 rounded-full px-8 py-4 text-sm pr-16" />
                <button type="submit" className="absolute right-2 top-2 bottom-2 aspect-square bg-[#2D2D2A] text-[#E8EDF3] rounded-full flex items-center justify-center"><Send className="w-4 h-4" /></button>
              </form>
            ) : <p className="text-xs text-[#4C4B40]/60 font-light italic text-center">Please sign in to join the conversation.</p>}
          </div>
        );
      }

      function Navbar() {
        const [isScrolled, setIsScrolled] = useState(false);
        useEffect(() => {
          const handleScroll = () => setIsScrolled(window.scrollY > 50);
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);
        return (
          <motion.nav initial={{ y: -100 }} animate={{ y: 0 }} className={cn("fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-6 transition-all duration-300", isScrolled ? "backdrop-blur-md bg-white/70 border-b border-black/5 py-4" : "bg-transparent")}>
            <div className="flex items-center gap-2"><Mountain className="w-6 h-6 text-[#4C4B40]" /><span className="text-sm font-bold tracking-widest uppercase text-[#2D2D2A]">Base Camping</span></div>
            <div className="hidden md:flex items-center gap-8 text-[10px] font-bold tracking-widest uppercase text-[#4C4B40]">
              <a href="#metaphor" className="hover:text-[#D4A373]">The Metaphor</a>
              <a href="#book" className="hover:text-[#D4A373]">The Book</a>
              <a href="#community" className="hover:text-[#D4A373]">Community</a>
              <a href="#author" className="hover:text-[#D4A373]">The Author</a>
              <a href="https://www.amazon.com" target="_blank" className="px-6 py-3 bg-[#2D2D2A] text-[#E8EDF3] rounded-full">Pre-Order</a>
            </div>
          </motion.nav>
        );
      }

      function Hero() {
        return (
          <section className="relative h-screen flex items-center justify-center overflow-hidden pt-20">
            <motion.div initial={{ scale: 1.1 }} animate={{ scale: 1 }} transition={{ duration: 2 }} className="absolute inset-0 z-0">
              <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000" className="w-full h-full object-cover opacity-90" referrerPolicy="no-referrer" />
              <div className="absolute inset-0 bg-gradient-to-b from-[#E8EDF3]/20 via-transparent to-[#E8EDF3]" />
            </motion.div>
            <div className="relative z-10 text-center px-4 max-w-5xl">
              <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
                <span className="inline-block mb-6 px-5 py-1.5 border border-black/20 rounded-full text-[10px] font-bold tracking-[0.3em] uppercase text-[#4C4B40] bg-white/40 backdrop-blur-md shadow-sm">Beyond the Empty Nest</span>
                <h1 className="text-7xl md:text-9xl font-serif mb-8 leading-[0.85] text-[#2D2D2A] tracking-tighter">Base <span className="italic font-light">Camping</span></h1>
                <p className="text-xl md:text-2xl text-[#4C4B40] font-light max-w-3xl mx-auto mb-12 leading-relaxed">The empty nest isn’t an ending—it’s an opening. A sacred opportunity where new dreams are built and a fresh sense of calling takes shape.</p>
                <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                  <button className="px-10 py-5 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2">Explore the Guide <ChevronRight className="w-4 h-4" /></button>
                  <a href="https://www.amazon.com" target="_blank" className="px-10 py-5 border border-black/20 text-[#2D2D2A] rounded-full text-xs font-bold uppercase tracking-widest">Pre-Order Now</a>
                </div>
              </motion.div>
            </div>
          </section>
        );
      }

      function MetaphorSection() {
        return (
          <section id="metaphor" className="py-32 px-8 bg-white overflow-hidden">
            <div className="max-w-6xl mx-auto grid lg:grid-cols-[1fr_1.2fr] gap-20 items-center">
              <div className="space-y-10">
                <div className="w-20 h-1.5 bg-[#D4A373] rounded-full" />
                <h2 className="text-5xl md:text-6xl leading-[1.1] tracking-tight">You are the <span className="italic font-light">Base Camp</span>. <br />They are the <span className="italic font-light">Climbers</span>.</h2>
                <p className="text-[#4C4B40] leading-relaxed text-xl font-light">The phrase “empty nest” has become cultural shorthand for a transition many parents quietly dread. But what if the emptiness isn’t an ending at all? What if it’s an opening?</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-10">
                  <div className="space-y-4 p-6 rounded-2xl bg-[#E8EDF3]/30 border border-black/5">
                    <Tent className="w-6 h-6 text-[#D4A373]" />
                    <h4 className="font-bold text-xs uppercase tracking-[0.2em] text-[#2D2D2A]">Reliability</h4>
                    <p className="text-sm text-[#4C4B40]/80 leading-relaxed">A safe haven when the weather turns harsh and the path becomes uncertain.</p>
                  </div>
                  <div className="space-y-4 p-6 rounded-2xl bg-[#E8EDF3]/30 border border-black/5">
                    <Compass className="w-6 h-6 text-[#D4A373]" />
                    <h4 className="font-bold text-xs uppercase tracking-[0.2em] text-[#2D2D2A]">Wisdom</h4>
                    <p className="text-sm text-[#4C4B40]/80 leading-relaxed">Providing the long-view perspective that only comes from having walked the valley floor.</p>
                  </div>
                </div>
              </div>
              <div className="relative">
                <div className="relative aspect-[4/5] rounded-[2rem] overflow-hidden shadow-2xl">
                  <img src="https://scontent-den2-1.xx.fbcdn.net/v/t39.30808-6/505441402_10232767610029828_7191845792755838213_n.jpg?stp=cp6_dst-jpg_tt6&_nc_cat=102&ccb=1-7&_nc_sid=53a332&_nc_ohc=8toJCiOgb1gQ7kNvwG-o07C&_nc_oc=AdpG6mZAeq8l4TfuAK8QYrBjcQqY41UIhETaaZeQDdOagmJnX5CMzORHI9PDNuHzViU&_nc_zt=23&_nc_ht=scontent-den2-1.xx&_nc_gid=0NJVU2i5wMRV0-N_--XFaQ&_nc_ss=8&oh=00_AfwIX6ZWBWIxuQIwr-Tr4i-v-2KLD0YC0ErfPS9RWFTYGA&oe=69C15C45" className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                </div>
                <div className="absolute -bottom-10 -left-10 md:-left-20 right-10 md:right-auto md:w-[400px] p-10 bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20">
                  <p className="text-xl italic font-serif text-[#2D2D2A]">"I lift up my eyes to the mountains—where does my help come from? My help comes from the Lord, the Maker of heaven and earth."</p>
                  <p className="text-[10px] uppercase tracking-[0.3em] font-bold text-[#4C4B40] mt-6">— Psalm 121:1-2</p>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function QuoteSection() {
        return (
          <section className="py-32 bg-[#2D2D2A] text-[#E8EDF3] relative overflow-hidden text-center">
