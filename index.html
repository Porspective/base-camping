          title: "Rethinking the Empty Nest",
          quote: "“Every new beginning comes from some other beginning’s end.” - Seneca",
          content: `The phrase “empty nest” has become a cultural shorthand for a particular life transition - when children leave home and parents are left behind in a quieter, emptier house. It’s a term often accompanied by sympathetic smiles and assumptions of loss. But what if we’ve been looking at it all wrong?

My wife, Dana, and I raised two wonderful children, Connor and Madi, in San Antonio. When Connor graduated from high school and went to college out of state, the house grew quieter.

Two years later when Madi began preparing for her own high school graduation (and also to go out of state for college), the question started coming more frequently: “So, you’re about to become empty nesters?”

### Let’s call it our base camp.

The Power of a New Metaphor

I believe many parents quietly experience this season as a loss of relevance. The house grows quieter. Advice is requested less often. The role that once defined our days no longer demands our attention in quite the same way. 

But this transition is not an epilogue - it’s an intentional shift. Not simply surviving change, but shaping it. A chance to rediscover passions, cultivate new dreams, and fully embrace the person God is still forming.

Growing up in Durango, Colorado near the San Juan Mountains, I learned early that a base camp is a unique place for climbers who are making their ascent. It’s a place of preparation, recovery, and belonging. Climbers visit - and leave - the base camp, but it maintains a posture of readiness and support.

In this metaphor, our children are the climbers. They will ascend their own mountains - college, vocation, relationships, and faith. And we, increasingly, become their base camp. Less directive, but still an essential source of safety and security for those we love.`
        },

          content: `The term “nest” traditionally conjures up images of comfort and coziness. It’s where the young are nurtured until they’re ready to fly. But here’s the thing: a nest stays essentially the same. A static space.

### Reimagining the Nest

What if the twigs and threads of your home, faith, and relationships don’t fall apart when the kids leave - what if they get rewoven into something more expansive? Maybe the nest becomes a truly new thing: a place for connection, creativity, rest, and renewal. Maybe it’s God gently creating space for what’s next. 

The base camp mindset begins right here - in the shift from seeing yourself as someone left behind to seeing yourself as someone well-positioned for what God has ahead.

The base camp mindset reshapes three core areas of life in this season: How we lead, how we delight, and how we care for what God has entrusted to us.
• Leadership becomes quieter but more personal.
• Joy becomes deeper and less rushed.
• And stewardship extends even to our bodies, which carry us into whatever God has next.

### The Evolution of the Base Camper

When mountaineers set out to summit a peak, they don’t start at base camp. They’ve already climbed a good distance before ever reaching it. And when they arrive, they find a place of rest, preparation, and support.

You’ve already weathered your own climb: the sleepless nights, scraped knees, science projects that started at 10 p.m., the first days of school, the driving lessons, and the nerve-wracking launch into young adulthood. 

But as our children step into adulthood, what they need - and what you need - begins to shift. They no longer require constant supervision, but they still need our presence and engagement, even in the mundane moments. Emotional support now moves at a digital rhythm: quick texts, Instagram reels, FaceTime calls, and the occasional, “Call me immediately” message that stops your heart for half a second.

### Physical Stewardship of Base Camp

“Do you not know that your bodies are temples of the Holy Spirit, who is in you, whom you have received from God? You are not your own; you were bought at a price. Therefore honor God with your bodies.” - 1 Corinthians 6:19-20 

Physical fitness isn’t vanity. It’s stewardship. When I began training to become a ski instructor, I quickly learned that loving the mountains wasn’t enough - I had to prepare my body to serve on them. Training stopped feeling like obligation and started feeling like gratitude in motion. Every mile walked, every rep completed, every game played with friends becomes a prayer of gratitude.`

          quote: "“I lift up my eyes to the mountains - where does my help come from? My help comes from the Lord, the Maker of heaven and earth.” - Psalm 121:1-2",
          content: `The transition to base camping isn’t just about building a home - although that may be part of your dream. It’s about building a new phase of life. And every new phase needs a vision. 

Before you establish your base camp, you have to lift your eyes and consider what mountain stands before you now. This chapter is about asking the deeper questions that stir your heart and guide your next steps. 

### A New Trailhead

Proverbs 16:3 tells us, “Commit to the Lord whatever you do, and He will establish your plans.”

In mountaineering, climbers don’t just wander into the wilderness hoping to bump into a summit. They study maps, assess risks, and chart their course with intention. They begin at a trailhead - aware that what lies ahead will require preparation, humility, and trust.

### The Adventure of Travel

For many, adventure means stepping beyond the familiar. Travel - especially international travel - can become a powerful companion in this season. Not the rushed, check-the-box kind that sends you home exhausted, but the kind that actually expands you.
• Witness new cultures up close. Stand inside a centuries-old cathedral.
• Form new rituals. Annual father-daughter expeditions or mother-son hikes.
• Taste the world with courage. Honor another culture through its food.

### Refine Your Vision

Create a physical or digital vision map - a living, evolving document that gives shape to the calling God is stirring in you. Digital vision maps can be dynamic canvases: photos, scripture, and notes gathered in one place. Co-designing a dream with your spouse doesn’t just chart a destination - it strengthens the bond between you. 

Wherever you find yourself - surrounded by people or walking quietly alone, thriving or enduring - your mountain is still worth climbing. Commit what you can today, and trust that God will establish the path.`

          content: `Every base camp begins with a location. Before you can build a home that nourishes your soul and supports your family’s future, you must find the land that will hold it. This chapter explores the spiritual and practical journey of choosing where to plant your next roots.

### Honor your Current Base Camp

“Nevertheless, each person should live as a believer in whatever situation the Lord has assigned to them.” - 1 Corinthians 7:17

There’s nothing wrong with staying right where you are. A well-rooted base camp can be a powerful place of ministry and peace. Staying put allows you to deepen established relationships and continue cultivating spiritual soil. But staying put doesn’t mean staying the same.

### The Spiritual Significance of Land

God called Abram to leave the comfort of the familiar and journey toward a new land - a place that would become the foundation of a legacy. The Israelites wandered for generations in search of the Promised Land, learning faith and endurance along the way. Land, then, is sacred. It’s the setting for divine encounters and human flourishing.

### Colorado as a Case Study

For me, the mountains of Durango, Colorado, have always held a sacred place in my story. It’s where I grew up, where I first learned to recognize God’s handiwork in creation. Returning as an adult, the familiar ridgelines carried new meaning. Up in the high-alpine air, peaks rise like cathedrals, and aspens tremble like congregations in worship. Returning to Durango allowed me to rediscover home as a base camp for the life God was inviting us into next.`

      function App() {

                          {sec.options.map(opt => (
                            <label key={opt} className="checkbox-item flex items-center gap-4 p-6 bg-basecamp-sky/5 rounded-2xl cursor-pointer hover:bg-white transition-all border border-transparent hover:border-basecamp-accent/20">

        );
