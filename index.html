          title: "Rethinking the Empty Nest",
          quote: "“Every new beginning comes from some other beginning’s end.” - Seneca",
          content: `The phrase “empty nest” has become a cultural shorthand for a particular life transition - when children leave home and parents are left behind in a quieter, emptier house. It’s a term often accompanied by sympathetic smiles and assumptions of loss. But what if we’ve been looking at it all wrong?

My wife, Dana, and I raised two wonderful children, Connor and Madi, in San Antonio. When Connor graduated from high school and went to college out of state, the house grew quieter.

Two years later when Madi began preparing for her own high school graduation (and also to go out of state for college), the question started coming more frequently: “So, you’re about to become empty nesters?”

Each time, I’d offer a polite smile, but inside the term felt off - like a label that I didn’t want to wear. “Empty” evokes mostly negative images: empty tank, empty wallet, empty heart, empty mind. Few things in life that are empty are considered positive (except maybe a laundry basket).

But this season isn’t about emptiness. It’s about transition. It’s about renewal. It’s about God’s ongoing purpose in our lives.

So what do we call this new season? If not an “empty nest,” then what?

### Let’s call it our base camp.

### The Power of a New Metaphor

I believe many parents quietly experience this season as a loss of relevance. The house grows quieter. Advice is requested less often. The role that once defined our days no longer demands our attention in quite the same way.

But this transition is not an epilogue - it’s an intentional shift. Not simply surviving change, but shaping it. A chance to rediscover passions, cultivate new dreams, and fully embrace the person God is still forming.

Growing up in Durango, Colorado near the San Juan Mountains, I learned early that a base camp is a unique place for climbers who are making their ascent. It’s a place of preparation, recovery, and belonging. Climbers visit - and leave - the base camp, but it maintains a posture of readiness and support.

In this metaphor, our children are the climbers. They will ascend their own mountains - college, vocation, relationships, and faith. And we, increasingly, become their base camp. Less directive, but still an essential source of safety and security for those we love.

### What Base Camping Is Not

Before we go much further, let’s establish together that this book is not a manual for retirement - or a blueprint for a specific lifestyle. My goal is to help you recognize that there also is still a climb for you ahead - and that how you prepare for it matters.

The invitation is simple: stop drifting between what was and what’s next, and begin building a life rooted deeply enough that you and others can draw strength from it.

In the chapters and reflections ahead, we’ll explore how to:
• Reframe your identity beyond career and parenting
• Serve others from a position of experience and spiritual depth
• Create a “base camp” that blesses both those who leave and those who arrive

This is a book about preparing for what comes next - faithfully, creatively, and courageously.

### Biblical Foundations for Base Camping

Scripture is filled with imagery that mirrors the heart of base camping - places of preparation, community, and encounters with God.

Moses leading the Israelites to Mount Sinai is one of the clearest examples. In Exodus 19, Moses brings the people out of their camp to meet with God. It wasn’t just a physical relocation; it was a spiritual realignment. Their camp became the staging ground where ordinary life evolved and a new sense of purpose broke through.

And Moses didn’t ascend the mountain as a lone hero. He climbed with the strength of the Lord behind him and returned with wisdom meant to guide them all. In many ways, this mirrors our calling as modern base campers. We’ve climbed our own mountains - career, parenting, faith, hardship - and we now stand in a place uniquely suited to support and steady others as they climb their own.

Later, in Numbers 1:52, we see that each tribe of Israel had its own camp arranged around the Tabernacle. These encampments weren’t scattered or accidental; they were intentional, ordered, and sacred. Every camp reflected identity, belonging, and God’s design for life lived in community. Where they camped shaped how they lived.

That same truth is available to us. This time of life is not defined by emptiness but by empowerment. It’s a time to lift your eyes from the trail and recognize that the view from here is still spectacular - rich with purpose, shaped by experience, and perfectly positioned for God to use you in new and meaningful ways.

### The Pace Changes; the Purpose Deepens

For many, this new phase of life arrives just as a professional career begins to wind down.

I enjoyed a deeply fulfilling corporate career - most of it at USAA, a financial services company that serves military members and their families. I led philanthropic initiatives that supported the resilience and wellbeing of veterans, their families and caregivers. I prayed continually for God to remain at the center of that work and to equip me to lead with integrity and compassion.

A few years before I became eligible to retire, I began seriously contemplating what life after corporate America could look like. Time began to feel more fleeting - and finite. If life were a football game, based on average life expectancy, I was somewhere in the third quarter - and I found myself wondering what I wanted the fourth quarter to look like… and whether I could dare to dream for overtime.

I wondered if this was the perfect moment for a dramatic leap into the unknown - while I still had the energy, health, and curiosity to embrace it fully. Could I serve others not only through meetings and metrics, but through ministry, mentoring, and meaning in the mountains?

My decision to retire in 2025 from life in the fast lane coincided with a strong desire to continue to serve in a different place - and at a different pace.

Not everyone arrives at the base-camping stage after a long corporate runway. Some people have spent years in roles that didn’t feel as purpose-filled as they hoped, or carried responsibilities that never quite aligned with their dreams. Yet the invitation of reinvention remains just as compelling: an opportunity to craft a life that feels more aligned, more intentional, and more authentically you.

Reinvention isn’t reserved for people with a certain résumé, financial position, relational status or professional history - it’s available to anyone willing to ask what God might be prompting for them next.

### A Season Made for a Growth Spurt

Base camping invites you into this entirely different rhythm. It’s your chance to build a stage of life marked by intention - to shape a home that’s more than a roof and walls. It becomes a place where wisdom is poured like a warm drink, where hospitality has room to breathe, and where spiritual maturity finally stretches its legs.

For married couples, this season can be a beautiful time to rediscover what it means to dream together. One of my goals is to be married for fifty years, and we’re more than halfway there. I find myself thinking: Could we reinvent ourselves together?

This is the season to ask new questions: What still excites us? What do we want our home to feel like now? How do we want to serve, travel, create, or grow - side by side?

But not every base camper shares their tent with a spouse. Some enter this season single, divorced, or widowed. For you, the quiet may feel sharper and the questions may cut deeper. If that’s your story, hear this clearly: You are not a partial base camper. God’s call on your life is just as real, just as purposeful, and just as powerful.

And for some, this season even becomes a surprising doorway to new companionship. After years devoted almost entirely to a career - or to the demanding balance of work and raising children - you may finally find yourself with the margin you never had before: unhurried time, emotional presence, and the freedom to truly see another person and be seen.

In this season, Jesus’ promise to be with you takes on new weight. He is not an abstract comfort; He is your Companion. He knows what it is to walk alone, to be misunderstood, to shoulder responsibility without applause. He meets you in the silence, in the long evenings, and in the small victories of a life being rebuilt with courage.

Whatever your relational status, base camping isn’t only about who sits at your table - it’s about Who sits at the head of it. When Christ is at the front, any configuration of chairs becomes holy ground.

So ask yourself: Is it time to mix things up? To take a faithful risk? To rediscover passions that have been waiting - quietly, patiently - for space to breathe again?`

          quote: "“See, I am doing a new thing! Now it springs up; do you not perceive it? I am making a way in the wilderness and streams in the wasteland.” - Isaiah 43:19",
          content: `The shift from “empty nest” to “base camp” isn’t just a change in language - it’s a change in mindset. And mindset shapes everything.

If we believe this season is about loss, we will live cautiously, holding tightly to what was. But if we believe this season is about purpose, we begin to live with openness, expectation, and a willingness to grow.

The base camp mindset is rooted in this truth: God is not finished with you.

### Letting Go of a Finished Role

For many of us, parenting was not just a role - it was a central identity. Our schedules revolved around our children. Our decisions were filtered through what was best for them. Our homes were filled with activity, noise, and constant responsibility.

So when that role begins to shift, it can feel disorienting.

Who am I when I’m no longer needed in the same way?
What fills the space that used to be so full?

These are not signs of weakness - they are signs of transition.

Just as a climber cannot carry every piece of gear from one stage of the journey to the next, we cannot carry every aspect of our previous roles into this new season.

Some things must be released - not because they weren’t meaningful, but because they have fulfilled their purpose.

Letting go is not abandonment. It is trust.

It is trusting that what you have poured into your children will sustain them. It is trusting that God is at work in their lives, even when you are not physically present. And it is trusting that God is preparing something new in you as well.

### Embracing a Growth-Oriented Perspective

The base camp mindset invites you to shift from a maintenance mentality to a growth mentality.

Instead of asking, “How do I preserve what I’ve built?” we begin to ask, “What is God building in me now?”

Growth in this season may look different than it did in earlier years.
It may be quieter. Slower. More reflective.
But it is no less significant.

This is a season where:
• Wisdom deepens
• Faith matures
• Relationships become more intentional
• Purpose becomes more refined

Growth is not about striving to become someone else. It’s about becoming more fully who God has already created you to be.

### Reframing Time

One of the greatest gifts - and challenges - of this season is time.

When the daily demands of parenting lessen, we often find ourselves with more unstructured hours than we’ve had in decades.

At first, this can feel like freedom.
But it can also feel like uncertainty.

What do I do with this time?
How do I use it well?

The base camp mindset encourages us to see time not as something to fill, but as something to steward.

Time is not empty space - it is opportunity.
Opportunity to:
• Invest in your relationship with God
• Reconnect with your spouse or deepen friendships
• Serve others in meaningful ways
• Pursue interests that have been set aside

The question is not how to stay busy, but how to stay aligned.

### Living with Open Hands

A base camper does not cling tightly to what has been - they live with open hands.

Open hands to release what is no longer theirs to carry.
Open hands to receive what God is placing before them.
Open hands to give generously of their time, wisdom, and presence.

This posture of openness requires trust.
Trust that God’s plans are good.
Trust that His timing is intentional.
Trust that even when the path ahead is unclear, He is already there.

### The Courage to Begin Again

Perhaps the most challenging aspect of this mindset is the willingness to begin again.

Starting something new later in life can feel intimidating.
We may wonder:
Is it too late?
Do I still have what it takes?
Will this even matter?

But throughout Scripture, we see God calling people into new seasons of purpose at unexpected times.
• Abraham was called to leave his homeland and step into the unknown.
• Moses was called to lead after years in the wilderness.
• Elizabeth became a mother when it seemed impossible.

God is not limited by age, stage, or past experience.
He works in seasons.
And this season is not the end of your story.
It is the continuation of it.

### Anchored, Not Adrift

The base camp mindset is not about drifting through this season, hoping to stay comfortable.
It is about being anchored.
Anchored in identity.
Anchored in purpose.
Anchored in faith.

When you are anchored, you can face uncertainty without fear.
You can embrace change without losing yourself.
You can move forward with confidence, knowing that your foundation is secure.

This is the mindset that transforms an “empty nest” into a thriving base camp.`

          title: "Mapping Your Mountain",
          quote: "“I lift up my eyes to the mountains - where does my help come from? My help comes from the Lord, the Maker of heaven and earth.” - Psalm 121:1–2",
          content: `Every climber begins with a question: Where am I going?

Without a clear destination, even the most prepared climber will wander. Energy will be spent, time will pass, but progress will feel scattered and uncertain.

In this season of life, many people find themselves asking that same question again.

What is my mountain now?

For years, your “mountain” may have been clear. Raising children. Building a career. Providing stability. Meeting the demands of the moment.

But now, the terrain has shifted.
And with that shift comes an opportunity - not to drift, but to define.

### Naming Your Mountain

Your mountain is not just a goal. It is a direction.
It reflects what matters most to you in this season - what you feel called to pursue, invest in, and build toward.

For some, that mountain may be relational:
• Restoring a strained relationship
• Investing deeply in friendships
• Becoming a steady presence for your family in a new way

For others, it may be missional:
• Serving in your church or community
• Mentoring others
• Using your experience to make a meaningful impact

And for some, it may be personal:
• Growing in your faith
• Developing new skills
• Pursuing long-held passions

Your mountain may not look like anyone else’s - and that’s the point.
God does not call us all to the same summit.

### Listening Before Moving

Before a climber begins their ascent, they study the terrain.
They observe. They plan. They prepare.

In the same way, mapping your mountain begins with listening.
• Listening to God.
• Listening to your own heart.
• Listening to the patterns and experiences that have shaped your life.

This kind of listening requires intentional space.
It may not happen in the rush of daily activity.
It often happens in quiet moments - in prayer, reflection, or even conversation with trusted people.

Ask yourself:
Where do I feel drawn?
What burdens or passions keep resurfacing?
What opportunities keep appearing in front of me?

These are often clues pointing toward your mountain.

### Aligning with Your Calling

Your mountain should not be chosen randomly.
It should be aligned with who God has created you to be.
Your gifts, experiences, and even your challenges are not accidental.
They are part of the way God has shaped you.

When your direction aligns with your design, your efforts become more meaningful.
You begin to move with clarity instead of confusion.
With purpose instead of pressure.

Alignment does not mean everything will be easy.
But it does mean your steps will be intentional.

### Avoiding the Comparison Trap

One of the quickest ways to lose clarity is to compare your mountain to someone else’s.
In this stage of life especially, it can be tempting to look around and measure yourself against others.
• What are they doing with their time?
• How are they serving?
• What have they accomplished?

But comparison distracts.
It shifts your focus from your path to theirs.
And in doing so, it can lead you away from the very direction God has for you.

Your mountain is yours.
It is shaped by your story, your calling, and your season.
Stay focused on that.

### Setting a Direction, Not a Deadline

Mapping your mountain is not about creating a rigid timeline.
It is about setting a direction.
A direction that you can begin moving toward, even if you don’t have every detail figured out.

Climbers rarely see the entire path from the base.
They take one step at a time.
They adjust as they go.
They remain attentive to the terrain.

You can do the same.
Start where you are.
Take the next step.
Trust that clarity will come as you move forward.

### Moving with Confidence

Once your mountain begins to take shape, the next step is to move.
Not perfectly.
Not fearlessly.
But faithfully.

Confidence in this season does not come from having all the answers.
It comes from knowing that God is guiding your steps.
That He is present in the journey.
That He is working through both your successes and your uncertainties.

You do not have to have the entire map.
You only need enough to begin.

### A Journey Worth Taking

Mapping your mountain is not about achieving something impressive.
It is about living intentionally.
It is about choosing a direction that reflects your values, your faith, and your calling.
And then walking it - step by step.

This is your mountain.
And it is worth climbing.`

          title: "Finding Your Land",
          quote: "“The Lord had said to Abram, ‘Go from your country, your people and your father’s household to the land I will show you.’” - Genesis 12:1",
          content: `Once a climber knows their mountain, the next question becomes: Where will I build my life along the way?

In the base camp metaphor, this is your land.

Your land is not just a physical place - though it can include that. It is the environment where your life takes shape in this season. It is where your values are lived out, where your rhythms are formed, and where your calling is expressed day by day.

Finding your land is about discernment.
It is about recognizing where God is leading you to plant your life in this next chapter.

### The Courage to Go

When God called Abram in Genesis 12, He did not give him a detailed map.
He gave him a direction.
“Go… to the land I will show you.”

Abram had to leave what was familiar in order to step into what was promised.
That kind of movement requires courage.
It requires a willingness to release comfort, predictability, and control.

In this season, you may not be called to move geographically.
But you may be called to move relationally, spiritually, or vocationally.
• To step out of what has been comfortable.
• To step into what is new.

### Recognizing Your Environment

Your land includes the spaces and environments that shape your daily life.

Ask yourself:
• Where do I spend most of my time?
• Who am I surrounded by?
• What environments bring out the best in me?
• What environments drain me?

These questions help you discern whether your current “land” is aligned with where God is leading you.

Sometimes, finding your land means making adjustments:
• Changing how you spend your time
• Re-evaluating relationships
• Creating new environments that support growth

Your environment matters.
It influences your mindset, your habits, and your direction.

### Creating Intentional Space

Your land is not only something you find - it is something you shape.
You have the ability to create spaces that reflect your values and support your calling.

This may look like:
• Establishing rhythms of prayer and reflection in your home
• Creating a welcoming space for others
• Setting boundaries that protect your time and energy

Intentional space does not happen by accident.
It is built through choices.
• Choices about what you allow in.
• Choices about what you prioritize.
• Choices about how you structure your days.

### Living with Purpose Where You Are

There is a temptation to believe that purpose exists somewhere else.
In a different place.
In a different season.
In a different set of circumstances.

But often, God calls us to live with purpose right where we are.

Your current environment may not be perfect.
But it can still be meaningful.
It can still be used.
It can still be shaped into something that reflects your calling.

The question is not: Is this the perfect place?
The question is: How can I live faithfully here?

### Remaining Open to Change

While it is important to be present where you are, it is also important to remain open to change.

God’s leading is not always static.
There may be moments when He calls you to shift.
• To move.
• To step into something new.

Holding your land with open hands allows you to respond when those moments come.
It keeps you flexible.
Responsive.
Willing.

### Building a Life That Reflects Your Calling

Ultimately, finding your land is about building a life that reflects your calling.

It is about aligning your environment with your purpose.
• Your rhythms with your values.
• Your relationships with your direction.

This is not a one-time decision.
It is an ongoing process.
A continual alignment.
A steady movement toward the life God is inviting you to live.

### A Place to Stand and Serve

Your land becomes the place where you stand and serve.
Where you live out your faith.
Where you invest in others.
Where you continue to grow.

It is not just a place to exist.
It is a place to engage.
To contribute.
To build.

And as you do, your base camp becomes more than a concept.
It becomes a lived reality.`

      function App() {
        const [view, setView] = useState('home');
        const [activeId, setActiveId] = useState(null);

        const openChapter = (id) => { setActiveId(id); setView('chapter'); window.scrollTo(0,0); };
        const openWorksheetsGallery = () => { setView('worksheets-gallery'); window.scrollTo(0,0); };
        const openWorksheet = (id) => { setActiveId(id); setView('worksheet-detail'); window.scrollTo(0,0); };
        const goHome = () => { setView('home'); setActiveId(null); window.scrollTo(0,0); };

        const goToNextChapter = () => {
          if (activeId < 4) {
            setActiveId(activeId + 1);
            window.scrollTo(0,0);
          } else {
            goHome();
          }
        };

        return (
          <div className="min-h-screen bg-[#E8EDF3] flex flex-col font-sans selection:bg-basecamp-accent/20">
            <Navbar 
              onHome={goHome} 
              onWorksheets={openWorksheetsGallery}
              onSection={(s) => { setView('home'); setTimeout(() => document.getElementById(s)?.scrollIntoView({behavior:'smooth'}), 100); }} 
            />
            
            <main className="flex-grow">
              <AnimatePresence mode="wait">
                {view === 'home' && <HomeView onRead={openChapter} onWorksheet={openWorksheet} key="home" />}
                {view === 'chapter' && <ChapterView chapter={CHAPTERS.find(c => c.id === activeId)} onBack={goHome} onNext={goToNextChapter} onWorksheet={openWorksheet} key="chapter" />}
                {view === 'worksheets-gallery' && <WorksheetsGallery onWork={openWorksheet} key="worksheets-gallery" />}
                {view === 'worksheet-detail' && <WorksheetDetail ws={WORKSHEETS.find(w => w.id === activeId)} onBack={openWorksheetsGallery} key="worksheet-detail" />}
              </AnimatePresence>
            </main>
            
            <Footer />
          </div>
        );
      }

                    <span className="text-[10px] font-bold uppercase tracking-[0.4em] text-basecamp-accent block">Reflection + Planning</span>

                 </div>
              </div>
              <div className="space-y-12 md:space-y-16">
                {ws.sections.map((sec, i) => (
                  <div key={i} className="space-y-6">

                    {sec.type === "text" && <p className="text-basecamp-earth italic font-light text-base md:text-lg leading-relaxed">{sec.text}</p>}
                    {sec.type === "input" && (
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold uppercase opacity-40 tracking-widest">{sec.label}</label>
                        <input className="w-full bg-basecamp-sky/10 border-b-2 border-black/10 p-4 md:p-5 focus:border-basecamp-accent outline-none text-basecamp-stone transition-colors" placeholder="Enter reflection..." />
                      </div>
                    )}
                    {sec.type === "textarea" && (
                      <div className="space-y-2 text-left">
                        <label className="text-[10px] font-bold uppercase opacity-40 tracking-widest">{sec.label}</label>
                        <textarea rows={6} className="w-full bg-basecamp-sky/10 rounded-2xl md:rounded-3xl p-6 md:p-8 focus:border-basecamp-accent outline-none border border-transparent text-basecamp-stone resize-none transition-all font-light text-base md:text-lg leading-relaxed" placeholder="Share your thoughts..." />
                      </div>
                    )}
                    {sec.type === "checkboxes" && (
                      <div className="space-y-6 text-left">
                         {sec.label && <label className="text-[10px] font-bold uppercase tracking-widest opacity-40 block">{sec.label}</label>}
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-4 checkbox-container">

                             <label key={opt} className="checkbox-item flex items-center gap-4 p-5 md:p-6 bg-basecamp-sky/5 rounded-2xl cursor-pointer border border-transparent hover:border-basecamp-accent/20 transition-all">

                               <span className="text-sm md:text-base text-basecamp-stone font-medium ml-2 md:ml-4">{opt}</span>

                           ))}

                      </div>

                  </div>
                ))}

            </div>

      function ChapterView({ chapter, onBack, onNext, onWorksheet }) {
        if (!chapter) return null;
        return (
          <motion.div initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }} className="pt-24 md:pt-32 pb-20 px-6 max-w-4xl mx-auto min-h-screen text-basecamp-stone text-left">
            <button onClick={onBack} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-basecamp-accent mb-12 group outline-none"><ArrowLeft className="w-4 h-4 transition-transform group-hover:-translate-x-1" /> Return to Base Camp</button>
            <div className="prose prose-lg max-w-none text-basecamp-stone text-left">
              <span className="text-[10px] font-bold uppercase tracking-[0.4em] text-basecamp-accent mb-4 block text-left">Excerpt from Chapter 0{chapter.id}</span>
              <h1 className="text-4xl md:text-8xl font-serif mb-8 md:mb-10 leading-tight tracking-tighter text-left">{chapter.title}</h1>
              <blockquote className="text-xl md:text-2xl italic border-l-4 border-basecamp-accent pl-6 md:pl-10 py-4 mb-12 md:mb-16 text-basecamp-earth leading-snug font-serif bg-basecamp-sky/20 pr-6 md:pr-8 rounded-r-3xl text-left">{chapter.quote}</blockquote>
              <div className="font-light leading-relaxed whitespace-pre-wrap text-lg md:text-xl space-y-8 text-left">
                {chapter.content.split('\n\n').map((para, i) => {
                  if (para.startsWith('### ')) return <h3 key={i} className="text-2xl md:text-3xl font-serif mt-12 md:mt-16 mb-6 md:mb-8 text-basecamp-stone font-bold">{para.replace('### ', '')}</h3>;
                  if (para.includes('•')) {
                    return (
                      <ul key={i} className="list-disc pl-6 md:pl-8 space-y-4 mb-8">
                        {para.split('\n').filter(line => line.trim().length > 0).map((line, idx) => (
                          <li key={idx} className="pl-2">{line.replace('•', '').trim()}</li>
                        ))}
                      </ul>
                    );
                  }
                  return <p key={i} className="mb-8">{para}</p>;
                })}
              </div>
            </div>
            <div className="mt-16 md:mt-20 pt-10 border-t border-black/5 flex flex-col sm:flex-row gap-4 justify-center">
              {chapter.id < 4 && (
                <button onClick={onNext} className="px-10 md:px-12 py-4 md:py-5 bg-basecamp-stone text-white rounded-full text-[10px] font-bold uppercase tracking-widest shadow-xl hover:bg-basecamp-forest transition-all flex items-center justify-center gap-2">Next Chapter <ChevronRight className="w-4 h-4" /></button>
              )}
              <button onClick={() => onWorksheet(chapter.id)} className="px-10 md:px-12 py-4 md:py-5 bg-basecamp-accent text-white rounded-full text-[10px] font-bold uppercase tracking-widest shadow-xl hover:opacity-90 transition-all flex items-center justify-center gap-2">Interactive Worksheet <PenTool className="w-4 h-4" /></button>
              <button onClick={onBack} className="px-10 md:px-12 py-4 md:py-5 border border-black/10 text-basecamp-stone rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-all flex items-center justify-center gap-2"><HomeIcon className="w-4 h-4" /> Main Page</button>
            </div>
          </motion.div>
        );
      }

                  <div className="flex flex-col h-full justify-between">
                    <div>
                      <div className="flex items-center gap-4 mb-8 text-left">
                         <div className="w-12 h-12 md:w-14 md:h-14 rounded-2xl bg-basecamp-accent flex items-center justify-center text-white text-lg md:text-xl font-bold shadow-md border-2 border-white">B</div>

                      <div className="pt-8 md:pt-12 border-t border-black/10 text-left">
                         <h4 className="text-[10px] font-bold uppercase tracking-widest text-basecamp-forest mb-6 md:mb-8">Responses From The Trail</h4>

                    </div>
                  </div>

            </div>
          </section>

                   <a href="https://www.instagram.com/justin_schmitt?igsh=bnR4NDNtdWtxNGIw&utm_source=qr" target="_blank" className="flex items-center gap-3 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] hover:text-basecamp-accent transition-colors group text-left font-sans"><Instagram className="w-5 h-5 text-basecamp-accent" /> Instagram</a>

      const root = createRoot(document.getElementById('root'));
      root.render(<StrictMode><App /></StrictMode>);
