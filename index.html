<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base Camping | Beyond the Empty Nest</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              serif: ["Playfair Display", "serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              basecamp: {
                stone: "#2D2D2A",
                earth: "#4C4B40",
                sky: "#E8EDF3",
                accent: "#D4A373",
              },
            },
          },
        },
      }
    </script>
    
    <style type="text/css">
      .mountain-gradient {
        background: linear-gradient(to bottom, rgba(232, 237, 243, 0) 0%, rgba(232, 237, 243, 1) 100%);
      }
      
      /* Custom scrollbar */
      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }
      .scrollbar-thin::-webkit-scrollbar-track {
        background: transparent;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: rgba(45, 45, 42, 0.1);
        border-radius: 10px;
      }
      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: rgba(45, 45, 42, 0.2);
      }
      
      /* Perspective for book hover */
      .perspective-1000 {
        perspective: 1000px;
      }
    </style>

    <!-- React and Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for ESM Dependencies -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19?dev",
        "react-dom": "https://esm.sh/react-dom@19?dev",
        "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
        "motion/react": "https://esm.sh/motion/react",
        "lucide-react": "https://esm.sh/lucide-react",
        "clsx": "https://esm.sh/clsx",
        "tailwind-merge": "https://esm.sh/tailwind-merge",
        "firebase/app": "https://esm.sh/firebase/app",
        "firebase/auth": "https://esm.sh/firebase/auth",
        "firebase/firestore": "https://esm.sh/firebase/firestore"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import {StrictMode} from 'react';
      import {createRoot} from 'react-dom/client';
      import { motion, AnimatePresence } from "motion/react";
      import { Mountain, Tent, Map as MapIcon, Compass, BookOpen, User, ChevronRight, ArrowRight, MessageSquare, Send, LogIn, Plus, X } from "lucide-react";
      import { clsx } from "clsx";
      import { twMerge } from "tailwind-merge";
      import React, { useCallback, useState, useEffect } from "react";

      // Firebase imports
      import { initializeApp } from 'firebase/app';
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'firebase/auth';
      import { getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, limit, Timestamp, getDocFromServer } from 'firebase/firestore';

      // Inlined Firebase Configuration
      const firebaseConfig = {
        projectId: "gen-lang-client-0193285572",
        appId: "1:307650621337:web:d15291e700af35a0e26d08",
        apiKey: "AIzaSyAW4tK4syCdX2Z8oeqPdwGaytVzp01HW2g",
        authDomain: "gen-lang-client-0193285572.firebaseapp.com",
        firestoreDatabaseId: "ai-studio-26b79e90-40c3-40f1-bc36-be2388365943",
        storageBucket: "gen-lang-client-0193285572.firebasestorage.app",
        messagingSenderId: "307650621337",
        measurementId: ""
      };

      // Initialize Firebase SDK
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
      const auth = getAuth(app);
      const googleProvider = new GoogleAuthProvider();

      // Operation types for error handling
      const OperationType = {
        CREATE: 'create',
        UPDATE: 'update',
        DELETE: 'delete',
        LIST: 'list',
        GET: 'get',
        WRITE: 'write',
      };

      function handleFirestoreError(error, operationType, path) {
        const errInfo = {
          error: error instanceof Error ? error.message : String(error),
          authInfo: {
            userId: auth.currentUser?.uid,
            email: auth.currentUser?.email,
            emailVerified: auth.currentUser?.emailVerified,
            isAnonymous: auth.currentUser?.isAnonymous,
            tenantId: auth.currentUser?.tenantId,
            providerInfo: auth.currentUser?.providerData.map(provider => ({
              providerId: provider.providerId,
              displayName: provider.displayName,
              email: provider.email,
              photoUrl: provider.photoURL
            })) || []
          },
          operationType,
          path
        }
        console.error('Firestore Error: ', JSON.stringify(errInfo));
        throw new Error(JSON.stringify(errInfo));
      }

      // Test connection to Firestore
      async function testConnection() {
        try {
          await getDocFromServer(doc(db, 'test', 'connection'));
        } catch (error) {
          if(error instanceof Error && error.message.includes('the client is offline')) {
            console.error("Please check your Firebase configuration. ");
          }
        }
      }
      testConnection();

      function cn(...inputs) {
        return twMerge(clsx(inputs));
      }

      // Error Boundary Component
      class ErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false, errorInfo: null };
        }

        static getDerivedStateFromError(error) {
          return { hasError: true, errorInfo: error.message };
        }

        render() {
          if (this.state.hasError) {
            let displayError = this.state.errorInfo;
            try {
              const parsed = JSON.parse(this.state.errorInfo || "");
              if (parsed.error) {
                displayError = `${parsed.operationType.toUpperCase()} error at "${parsed.path}": ${parsed.error}`;
              }
            } catch (e) {}

            return (
              <div className="min-h-screen flex items-center justify-center bg-[#E8EDF3] p-8 font-sans">
                <div className="max-w-2xl w-full p-12 bg-white rounded-[3rem] shadow-2xl border border-black/5 text-center">
                  <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8">
                    <X className="w-10 h-10 text-red-500" />
                  </div>
                  <h2 className="text-3xl font-serif mb-4">Something went wrong</h2>
                  <p className="text-[#4C4B40]/60 font-light mb-8 italic">
                    The application encountered an unexpected error. This is often due to Firebase configuration or permissions.
                  </p>
                  <div className="bg-red-50 p-6 rounded-2xl text-left mb-10 overflow-auto max-h-60">
                    <p className="text-xs font-bold uppercase tracking-widest text-red-800 mb-2">Error Details</p>
                    <pre className="text-xs text-red-700 font-mono whitespace-pre-wrap break-all">
                      {displayError}
                    </pre>
                  </div>
                  <div className="flex flex-col sm:flex-row gap-4 justify-center">
                    <button 
                      onClick={() => this.setState({ hasError: false, errorInfo: null })}
                      className="px-10 py-4 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#4C4B40] transition-all shadow-xl shadow-black/20"
                    >
                      Try Again
                    </button>
                    <button 
                      onClick={() => window.location.reload()}
                      className="px-10 py-4 border border-black/20 text-[#2D2D2A] rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#E8EDF3] transition-all"
                    >
                      Reload Page
                    </button>
                  </div>
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }

      function App() {
        return (
          <ErrorBoundary>
            <div className="min-h-screen selection:bg-[#D4A373]/30 bg-[#E8EDF3]">
              <Navbar />
              <Hero />
              <MetaphorSection />
              <QuoteSection />
              <BookDetails />
              <CommunitySection />
              <AuthorSection />
              <Footer />
            </div>
          </ErrorBoundary>
        );
      }

      function CommunitySection() {
        const [user, setUser] = useState(null);
        const [threads, setThreads] = useState([]);
        const [selectedThread, setSelectedThread] = useState(null);
        const [isNewThreadModalOpen, setIsNewThreadModalOpen] = useState(false);
        const [newThreadTitle, setNewThreadTitle] = useState("");
        const [newThreadContent, setNewThreadContent] = useState("");
        const [isAuthReady, setIsAuthReady] = useState(false);
        const [loginError, setLoginError] = useState(null);

        useEffect(() => {
          const unsubscribe = onAuthStateChanged(auth, (u) => {
            setUser(u);
            setIsAuthReady(true);
          });
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!isAuthReady) return;
          
          const q = query(collection(db, "threads"), orderBy("createdAt", "desc"), limit(50));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const threadData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setThreads(threadData);
          }, (error) => {
            handleFirestoreError(error, OperationType.GET, "threads");
          });

          return () => unsubscribe();
        }, [isAuthReady]);

        const handleLogin = async () => {
          setLoginError(null);
          try {
            await signInWithPopup(auth, googleProvider);
          } catch (error) {
            console.error("Login failed", error);
            const errorCode = error.code;
            const errorMessage = error.message;
            
            if (errorCode === 'auth/unauthorized-domain') {
              setLoginError(`Domain "${window.location.hostname}" is not authorized. Add it to Firebase Console > Authentication > Settings > Authorized domains.`);
            } else if (errorCode === 'auth/popup-closed-by-user') {
              setLoginError("Login popup was closed. Please try again.");
            } else if (errorCode === 'auth/cancelled-popup-request') {
              setLoginError("Multiple login popups opened. Please try again.");
            } else {
              setLoginError(`Login failed (${errorCode}): ${errorMessage}`);
            }
          }
        };

        const [createThreadError, setCreateThreadError] = useState(null);

        const handleCreateThread = async (e) => {
          e.preventDefault();
          if (!user || !newThreadTitle || !newThreadContent) return;
          setCreateThreadError(null);

          try {
            await addDoc(collection(db, "threads"), {
              title: newThreadTitle,
              content: newThreadContent,
              authorId: user.uid,
              authorName: user.displayName || "Anonymous",
              authorPhoto: user.photoURL || "",
              createdAt: Timestamp.now()
            });
            setNewThreadTitle("");
            setNewThreadContent("");
            setIsNewThreadModalOpen(false);
          } catch (error) {
            console.error("Create thread failed", error);
            setCreateThreadError(`Failed to create thread: ${error.message || 'Please check your connection and try again.'}`);
          }
        };

        return (
          <section id="community" className="py-32 px-8 bg-white overflow-hidden">
            <div className="max-w-6xl mx-auto">
              <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                <div className="max-w-2xl">
                  <span className="text-[#D4A373] font-bold text-[10px] tracking-[0.3em] uppercase mb-4 block">The Base Camp Forum</span>
                  <h2 className="text-5xl md:text-7xl font-serif leading-none tracking-tighter">Community <span className="italic font-light text-[#4C4B40]/40">Threads</span></h2>
                </div>
                <div className="flex flex-col items-end gap-4">
                  {!user ? (
                    <div className="flex flex-col items-end gap-2">
                      <button 
                        onClick={handleLogin}
                        className="flex items-center gap-2 px-6 py-3 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#4C4B40] transition-all"
                      >
                        <LogIn className="w-4 h-4" />
                        Join the Conversation
                      </button>
                      {loginError && (
                        <p className="text-[10px] text-red-500 font-bold uppercase tracking-widest">{loginError}</p>
                      )}
                    </div>
                  ) : (
                    <button 
                      onClick={() => setIsNewThreadModalOpen(true)}
                      className="flex items-center gap-2 px-6 py-3 bg-[#D4A373] text-[#2D2D2A] rounded-full text-xs font-bold uppercase tracking-widest hover:scale-105 transition-all shadow-lg shadow-[#D4A373]/20"
                    >
                      <Plus className="w-4 h-4" />
                      Start a Thread
                    </button>
                  )}
                </div>
              </div>

              <div className="grid lg:grid-cols-[1fr_1.5fr] gap-12">
                <div className="space-y-4 max-h-[600px] overflow-y-auto pr-4 scrollbar-thin">
                  {threads.length === 0 ? (
                    <div className="p-12 text-center border-2 border-dashed border-black/10 rounded-[2rem]">
                      <MessageSquare className="w-12 h-12 text-black/20 mx-auto mb-4" />
                      <p className="text-[#4C4B40]/60 font-light italic">No threads yet. Be the first to share your thoughts.</p>
                    </div>
                  ) : (
                    threads.map((thread) => (
                      <motion.div
                        key={thread.id}
                        layoutId={thread.id}
                        onClick={() => setSelectedThread(thread)}
                        className={cn(
                          "p-6 rounded-2xl border transition-all cursor-pointer group",
                          selectedThread?.id === thread.id 
                            ? "bg-[#2D2D2A] text-[#E8EDF3] border-[#2D2D2A] shadow-xl" 
                            : "bg-[#E8EDF3]/30 border-black/5 hover:bg-white hover:shadow-lg"
                        )}
                      >
                        <div className="flex items-center gap-3 mb-4">
                          <div className="w-8 h-8 rounded-full overflow-hidden bg-[#4C4B40]/20 flex-shrink-0">
                            {thread.authorPhoto ? (
                              <img src={thread.authorPhoto} alt={thread.authorName} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                            ) : (
                              <User className="w-4 h-4 m-2" />
                            )}
                          </div>
                          <span className={cn("text-[10px] font-bold uppercase tracking-widest", selectedThread?.id === thread.id ? "text-[#E8EDF3]/60" : "text-[#4C4B40]/60")}>
                            {thread.authorName}
                          </span>
                        </div>
                        <h3 className="text-xl font-serif mb-2 group-hover:text-[#D4A373] transition-colors">{thread.title}</h3>
                        <p className={cn("text-sm line-clamp-2 font-light", selectedThread?.id === thread.id ? "text-[#E8EDF3]/70" : "text-[#4C4B40]/70")}>
                          {thread.content}
                        </p>
                      </motion.div>
                    ))
                  )}
                </div>

                <div className="bg-[#E8EDF3]/20 rounded-[2.5rem] p-8 md:p-12 border border-black/5 min-h-[600px] flex flex-col">
                  <AnimatePresence mode="wait">
                    {selectedThread ? (
                      <motion.div 
                        key={selectedThread.id}
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        exit={{ opacity: 0, y: -20 }}
                        className="flex flex-col h-full"
                      >
                        <div className="mb-10">
                          <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-12 rounded-2xl overflow-hidden bg-[#4C4B40] shadow-lg">
                              {selectedThread.authorPhoto ? (
                                <img src={selectedThread.authorPhoto} alt={selectedThread.authorName} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                              ) : (
                                <User className="w-6 h-6 m-3 text-[#E8EDF3]" />
                              )}
                            </div>
                            <div>
                              <h4 className="font-bold text-sm text-[#2D2D2A]">{selectedThread.authorName}</h4>
                              <p className="text-[10px] uppercase tracking-widest text-[#4C4B40]/60">
                                {selectedThread.createdAt?.toDate().toLocaleDateString()}
                              </p>
                            </div>
                          </div>
                          <h2 className="text-3xl md:text-4xl font-serif mb-6 leading-tight">{selectedThread.title}</h2>
                          <p className="text-[#4C4B40] text-lg leading-relaxed font-light whitespace-pre-wrap">
                            {selectedThread.content}
                          </p>
                        </div>

                        <div className="flex-grow border-t border-black/10 pt-10">
                          <h4 className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#2D2D2A] mb-8">Responses</h4>
                          <CommentsList threadId={selectedThread.id} user={user} />
                        </div>
                      </motion.div>
                    ) : (
                      <div className="flex flex-col items-center justify-center flex-grow text-center space-y-6">
                        <div className="w-20 h-20 rounded-full bg-black/5 flex items-center justify-center">
                          <Compass className="w-10 h-10 text-black/20" />
                        </div>
                        <div className="max-w-xs">
                          <h3 className="text-xl font-serif mb-2">Select a thread</h3>
                          <p className="text-sm text-[#4C4B40]/60 font-light">Choose a discussion from the list to read reflections and share your own.</p>
                        </div>
                      </div>
                    )}
                  </AnimatePresence>
                </div>
              </div>
            </div>

            <AnimatePresence>
              {isNewThreadModalOpen && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                  <motion.div 
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    onClick={() => setIsNewThreadModalOpen(false)}
                    className="absolute inset-0 bg-black/60 backdrop-blur-md"
                  />
                  <motion.div 
                    initial={{ opacity: 0, scale: 0.9, y: 20 }}
                    animate={{ opacity: 1, scale: 1, y: 0 }}
                    exit={{ opacity: 0, scale: 0.9, y: 20 }}
                    className="relative w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden"
                  >
                    <div className="p-8 md:p-12">
                      <div className="flex items-center justify-between mb-10">
                        <h2 className="text-3xl font-serif">Start a New <span className="italic">Reflection</span></h2>
                        <button onClick={() => setIsNewThreadModalOpen(false)} className="p-2 hover:bg-[#E8EDF3] rounded-full transition-colors">
                          <X className="w-6 h-6" />
                        </button>
                      </div>
                      <form onSubmit={handleCreateThread} className="space-y-6">
                        {createThreadError && (
                          <div className="p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs font-medium">
                            {createThreadError}
                          </div>
                        )}
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#4C4B40]/60 mb-2 block">Thread Title</label>
                          <input 
                            required
                            value={newThreadTitle}
                            onChange={(e) => setNewThreadTitle(e.target.value)}
                            placeholder="e.g., Navigating the first holiday alone"
                            className="w-full bg-[#E8EDF3]/30 border border-black/5 rounded-2xl px-6 py-4 text-[#2D2D2A] focus:outline-none focus:border-[#D4A373] transition-colors"
                          />
                        </div>
                        <div>
                          <label className="text-[10px] font-bold uppercase tracking-widest text-[#4C4B40]/60 mb-2 block">Your Thoughts</label>
                          <textarea 
                            required
                            value={newThreadContent}
                            onChange={(e) => setNewThreadContent(e.target.value)}
                            placeholder="Share your experience or ask a question..."
                            rows={6}
                            className="w-full bg-[#E8EDF3]/30 border border-black/5 rounded-2xl px-6 py-4 text-[#2D2D2A] focus:outline-none focus:border-[#D4A373] transition-colors resize-none"
                          />
                        </div>
                        <button 
                          type="submit"
                          className="w-full py-5 bg-[#2D2D2A] text-[#E8EDF3] rounded-full text-xs font-bold uppercase tracking-widest hover:bg-[#4C4B40] transition-all shadow-xl shadow-black/20"
                        >
                          Post to Base Camp
                        </button>
                      </form>
                    </div>
                  </motion.div>
                </div>
              )}
            </AnimatePresence>
          </section>
        );
      }

      function CommentsList({ threadId, user }) {
        const [comments, setComments] = useState([]);
        const [newComment, setNewComment] = useState("");

        useEffect(() => {
          const q = query(collection(db, "threads", threadId, "comments"), orderBy("createdAt", "asc"));
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const commentData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setComments(commentData);
          }, (error) => {
            handleFirestoreError(error, OperationType.GET, `threads/${threadId}/comments`);
          });
          return () => unsubscribe();
        }, [threadId]);

        const handleAddComment = async (e) => {
          e.preventDefault();
          if (!user || !newComment) return;

          try {
            await addDoc(collection(db, "threads", threadId, "comments"), {
              content: newComment,
              authorId: user.uid,
              authorName: user.displayName || "Anonymous",
              authorPhoto: user.photoURL || "",
              createdAt: Timestamp.now()
            });
            setNewComment("");
          } catch (error) {
            handleFirestoreError(error, OperationType.CREATE, `threads/${threadId}/comments`);
          }
        };

        return (
          <div className="space-y-8">
            <div className="space-y-6">
              {comments.map((comment) => (
                <div key={comment.id} className="flex gap-4">
                  <div className="w-8 h-8 rounded-full overflow-hidden bg-[#4C4B40]/10 flex-shrink-0">
                    {comment.authorPhoto ? (
                      <img src={comment.authorPhoto} alt={comment.authorName} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                    ) : (
                      <User className="w-4 h-4 m-2" />
                    )}
                  </div>
                  <div className="flex-grow">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-bold text-[#2D2D2A]">{comment.authorName}</span>
                      <span className="text-[10px] text-[#4C4B40]/40 uppercase tracking-widest">
                        {comment.createdAt?.toDate().toLocaleDateString()}
                      </span>
                    </div>
                    <p className="text-sm text-[#4C4B40] leading-relaxed font-light">{comment.content}</p>
                  </div>
                </div>
              ))}
            </div>

            {user ? (
              <form onSubmit={handleAddComment} className="relative mt-10">
                <input 
                  value={newComment}
                  onChange={(e) => setNewComment(e.target.value)}
                  placeholder="Add a response..."
                  className="w-full bg-white border border-black/10 rounded-full px-8 py-4 text-sm focus:outline-none focus:border-[#D4A373] transition-colors pr-16"
                />
                <button 
                  type="submit"
                  className="absolute right-2 top-2 bottom-2 aspect-square bg-[#2D2D2A] text-[#E8EDF3] rounded-full flex items-center justify-center hover:bg-[#D4A373] hover:text-[#2D2D2A] transition-colors"
                >
                  <Send className="w-4 h-4" />
                </button>
              </form>
            ) : (
              <div className="p-6 bg-white/50 rounded-2xl border border-dashed border-black/10 text-center">
                <p className="text-xs text-[#4C4B40]/60 font-light italic">Please sign in to join the conversation.</p>
              </div>
            )}
          </div>
        );
      }

      function Navbar() {
        const [isScrolled, setIsScrolled] = useState(false);

        useEffect(() => {
          const handleScroll = () => setIsScrolled(window.scrollY > 50);
          window.addEventListener("scroll", handleScroll);
          return () => window.removeEventListener("scroll", handleScroll);
        }, []);

        return (
          <motion.nav 
            initial={{ y: -100 }}
            animate={{ y: 0 }}
